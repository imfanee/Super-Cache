name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Race tests
        run: go test -race -count=1 -timeout=5m ./...

      - name: Coverage report
        run: |
          go test -coverprofile=coverage.out -timeout=5m ./...
          go tool cover -func=coverage.out

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... || echo "::warning::govulncheck found issues (may require Go version upgrade)"

  build-binaries:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build supercache
        run: |
          mkdir -p build
          CGO_ENABLED=0 go build -a -ldflags "-s -w -X main.Version=${GITHUB_SHA}" -o build/supercache ./cmd/supercache/...

      - name: Build supercache-cli
        run: |
          CGO_ENABLED=0 go build -a -ldflags "-s -w -X main.Version=${GITHUB_SHA}" -o build/supercache-cli ./cmd/supercache-cli/...

      - name: Verify binaries exist
        run: |
          test -f build/supercache
          test -f build/supercache-cli
          ./build/supercache -version
          ./build/supercache-cli --version

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: supercache-binaries
          path: |
            build/supercache
            build/supercache-cli

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.57.2
          args: ./...
